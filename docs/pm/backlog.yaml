# Oryntra project backlog — canonical source for features & requirements.
# Update status here; run `npm run pm:report` for a summary.
#
# Status: proposed | planned | in_progress | blocked | done | deferred | cancelled
# Priority: critical | high | medium | low

meta:
  project: Oryntra
  spec_version: "1.2"
  last_updated: "2026-06-12"
  owner: Cursor agent + Steven Gerhart

requirements:
  - id: REQ-001
    title: Spatial review session
    description: User navigates a real browser; Oryntra captures clicks, route, mouse, and feedback moments.
    status: done
    phase: 1
    acceptance:
      - Playwright-attached Chromium opens at app URL
      - Review Room shows session status, route, and element context
      - Click, navigation, console, and network events stream to UI
    features: [FEAT-001, FEAT-002, FEAT-003]

  - id: REQ-002
    title: Feedback capture with spatial bundle
    description: Typed (or voice) feedback creates a FeedbackMoment with screenshot and spatial context.
    status: done
    phase: 1
    acceptance:
      - Submit feedback captures mouse, element, screenshot, a11y snapshot
      - Moments persist in SQLite; screenshots on disk
    features: [FEAT-004, FEAT-005]

  - id: REQ-003
    title: Review facilitator and artifacts
    description: Agent interprets feedback and drafts change requests / work orders for approval.
    status: done
    phase: 3
    acceptance:
      - Facilitator returns interpretation and summary
      - User can approve or reject proposed change requests in Review Room
    features: [FEAT-006, FEAT-007, FEAT-008]

  - id: REQ-004
    title: IDE handoff via MCP
    description: Cursor agent can list sessions, read artifacts, and implement approved changes in workspace.
    status: done
    phase: 4
    acceptance:
      - MCP server exposes session and artifact tools
      - collaborate_now starts review without manual npm steps
      - Review history syncs to workspace markdown for Cursor
    features: [FEAT-009, FEAT-010, FEAT-011, FEAT-012]

  - id: REQ-005
    title: Execution loop in workspace
    description: Approved artifacts drive implementation in git worktree or workspace with visible progress.
    status: done
    phase: 5
    acceptance:
      - Approve triggers implement request and agent run
      - User sees implementation steps / Done in Review Room
      - Stale implement state does not block new sessions
    features: [FEAT-013, FEAT-014, FEAT-015, FEAT-016]

  - id: REQ-006
    title: Visual evidence in review UX
    description: Reviewer sees what was captured — screenshots and highlights — not only chat text.
    status: done
    phase: 2
    acceptance:
      - Screenshot thumbnail appears in chat after Send
      - Element highlight shown when Pick element / Explain click used
      - Optional manual Snap before typing
    features: [FEAT-017, FEAT-018, FEAT-019]

  - id: REQ-007
    title: Region / area feedback
    description: User can mark an arbitrary screen region when feedback is not a single DOM element.
    status: proposed
    phase: 2
    acceptance:
      - Marquee drag on app preview attaches crop + coordinates to feedback moment
      - Region visible in evidence panel and review history
    features: [FEAT-020]

  - id: REQ-008
    title: Voice input
    description: Push-to-talk STT creates feedback moments with same spatial bundle as typed input.
    status: proposed
    phase: 6
    acceptance:
      - Mic in Review Room produces transcript + spatial moment
    features: [FEAT-021]

  - id: REQ-009
    title: Automated verification
    description: Playwright tests and before/after screenshots validate approved changes.
    status: proposed
    phase: 7
    acceptance:
      - verify_behavior MCP tool runs against acceptance criteria
    features: [FEAT-022]

  - id: REQ-010
    title: Enterprise single-screen review (browser extension)
    description: App in normal tab; Review Studio in side panel; authenticated capture.
    status: done
    phase: 6
    acceptance:
      - Extension captures spatial context from app tab
      - captureVisibleTab on feedback
      - No second browser window
    features: [FEAT-025, FEAT-026, FEAT-027]

  - id: REQ-011
    title: Multi-IDE detection and handoff routing
    description: Discover Cursor, VS Code, and other IDEs; route handoff to preferred IDE.
    status: done
    phase: 6
    acceptance:
      - MCP heartbeat registers IDE connections
      - GET /api/ide/available lists IDEs
      - Session preferredIde selects handoff target
    features: [FEAT-028, FEAT-029, FEAT-030]

