<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clarion Demo — Oryntra Test App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        if (!params.get("oryntra_session")) return;
        var api = params.get("oryntra_api") || "http://127.0.0.1:4317";
        var script = document.createElement("script");
        script.src = api + "/oryntra-bridge.js";
        script.async = true;
        document.head.appendChild(script);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
